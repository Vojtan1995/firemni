name: DB Backup

on:
  # Denní off-site záloha do R2. Vyžaduje nastavené secrets:
  #   PROD_DATABASE_URL, BACKUP_S3_BUCKET, BACKUP_S3_ENDPOINT,
  #   BACKUP_S3_ACCESS_KEY_ID, BACKUP_S3_SECRET_ACCESS_KEY
  #   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID (alert při selhání)
  schedule:
    - cron: '0 2 * * *'   # každý den 2:00 UTC (4:00 Prague letní čas)
  workflow_dispatch:
    # Umožní ruční spuštění z GitHub Actions UI

jobs:
  backup:
    name: pg_dump → R2/S3
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check backup storage configured
        run: |
          missing=""
          [ -z "${{ secrets.PROD_DATABASE_URL }}" ] && missing="${missing} PROD_DATABASE_URL"
          [ -z "${{ secrets.BACKUP_S3_BUCKET }}" ] && missing="${missing} BACKUP_S3_BUCKET"
          [ -z "${{ secrets.BACKUP_S3_ENDPOINT }}" ] && missing="${missing} BACKUP_S3_ENDPOINT"
          [ -z "${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}" ] && missing="${missing} BACKUP_S3_ACCESS_KEY_ID"
          [ -z "${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}" ] && missing="${missing} BACKUP_S3_SECRET_ACCESS_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Chybí secrets pro zálohu:${missing}. Doplň je v Settings → Secrets → Actions."
            exit 1
          fi
          # Ověř, že PROD_DATABASE_URL je platné connection URI s hostem.
          # Jinak by pg_dump spadl na lokální socket s nečitelnou hláškou.
          case "${{ secrets.PROD_DATABASE_URL }}" in
            postgres://*@*|postgresql://*@*) : ;;
            *)
              echo "::error::PROD_DATABASE_URL není platné URI. Očekávám tvar postgresql://USER:PASSWORD@HOST:PORT/DBNAME?sslmode=require"
              exit 1
              ;;
          esac

      - name: Install postgresql-client 18
        run: |
          # Produkční DB běží na PG 18; runner má ve výchozím repu jen klienta 16,
          # který odmítne dump novějšího serveru. Přidáme oficiální PGDG repo.
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo $VERSION_CODENAME)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18
          pg_dump --version

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          set -o pipefail
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          FILENAME="ucpavky_${TIMESTAMP}.sql.gz"
          echo "BACKUP_FILENAME=${FILENAME}" >> $GITHUB_ENV
          pg_dump "$DATABASE_URL" | gzip > "${FILENAME}"
          # Ověření integrity gzipu — poškozený dump zachytíme hned, ne až při obnově
          gunzip -t "${FILENAME}"
          SIZE=$(du -sh "${FILENAME}" | cut -f1)
          echo "Backup hotov: ${FILENAME} (${SIZE})"
          echo "✅ Záloha **${FILENAME}** (${SIZE}) — gzip integrita OK" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip install --quiet awscli
          aws s3 cp "${BACKUP_FILENAME}" \
            "s3://${{ secrets.BACKUP_S3_BUCKET }}/backups/${BACKUP_FILENAME}" \
            --endpoint-url "${{ secrets.BACKUP_S3_ENDPOINT }}" \
            --no-progress
          echo "Upload hotov: s3://${{ secrets.BACKUP_S3_BUCKET }}/backups/${BACKUP_FILENAME}"

      - name: Prune backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                   date -u -v -30d +%Y-%m-%dT%H:%M:%SZ)
          echo "Mazání záloh starších než: ${CUTOFF}"
          aws s3api list-objects-v2 \
            --bucket "${{ secrets.BACKUP_S3_BUCKET }}" \
            --prefix "backups/" \
            --endpoint-url "${{ secrets.BACKUP_S3_ENDPOINT }}" \
            --query "Contents[?LastModified<='${CUTOFF}'].Key" \
            --output text | \
          tr '\t' '\n' | \
          grep -v '^$' | \
          while read key; do
            echo "Mazání: ${key}"
            aws s3 rm "s3://${{ secrets.BACKUP_S3_BUCKET }}/${key}" \
              --endpoint-url "${{ secrets.BACKUP_S3_ENDPOINT }}"
          done || true

      - name: Cleanup local dump
        if: always()
        run: rm -f "${BACKUP_FILENAME}"

      - name: Telegram alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_* secrets nenastavené — alert přeskočen."
            exit 0
          fi
          MSG=$(printf '🔴 UNIFAST záloha DB SELHALA (run %s)\n%s' "${{ github.run_id }}" "${RUN_URL}")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            > /dev/null
