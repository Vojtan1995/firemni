name: Encrypted DB Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate configuration
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          ACCESS_KEY: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          SECRET_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
        run: |
          set -euo pipefail
          for name in DATABASE_URL BUCKET ENDPOINT ACCESS_KEY SECRET_KEY AGE_RECIPIENT; do
            [ -n "${!name:-}" ] || { echo "::error::Missing $name"; exit 1; }
          done
          case "$DATABASE_URL" in
            postgres://*@*|postgresql://*@*) ;;
            *) echo "::error::PROD_DATABASE_URL is not a PostgreSQL URI"; exit 1 ;;
          esac

      - name: Install PostgreSQL 18 client, age and AWS CLI
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          # awscli již není v apt repozitáři Ubuntu 24.04 – instalujeme oficiální AWS CLI v2.
          sudo apt-get install -y curl ca-certificates age unzip
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install --update
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo "$VERSION_CODENAME")-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-18

      - name: Create, encrypt and verify backup
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
        run: |
          set -euo pipefail
          timestamp="$(date -u +%Y%m%d_%H%M%S)"
          base="ucpavky_${timestamp}"
          dump="${base}.dump"
          encrypted="${dump}.age"
          manifest="${base}.manifest.json"

          /usr/lib/postgresql/18/bin/pg_dump -Fc --no-owner --no-acl \
            --file "$dump" "$DATABASE_URL"
          /usr/lib/postgresql/18/bin/pg_restore --list "$dump" >/dev/null
          age -r "$AGE_RECIPIENT" -o "$encrypted" "$dump"
          sha256sum "$encrypted" > "${encrypted}.sha256"

          db_version="$(/usr/lib/postgresql/18/bin/psql "$DATABASE_URL" -Atc 'SHOW server_version;')"
          migration_count="$(find backend/prisma/migrations -mindepth 1 -maxdepth 1 -type d | wc -l)"
          size="$(stat -c %s "$encrypted")"
          cat > "$manifest" <<EOF
          {
            "formatVersion": 1,
            "createdAt": "$(date -u +%FT%TZ)",
            "sourcePostgresVersion": "$db_version",
            "migrationCount": $migration_count,
            "gitCommit": "${GITHUB_SHA}",
            "encryptedFile": "$encrypted",
            "encryptedBytes": $size,
            "rpoTargetHours": 24,
            "rtoTargetHours": 4
          }
          EOF
          test "$size" -gt 1024
          rm -f "$dump"
          echo "BACKUP_BASE=$base" >> "$GITHUB_ENV"
          echo "BACKUP_FILE=$encrypted" >> "$GITHUB_ENV"
          echo "MANIFEST_FILE=$manifest" >> "$GITHUB_ENV"

      - name: Export encrypted privacy erasure ledger
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}
        run: |
          set -euo pipefail
          /usr/lib/postgresql/18/bin/psql "$DATABASE_URL" -Atc \
            "COPY (SELECT row_to_json(t) FROM (SELECT subject_user_id, actor_user_id, original_username_hash, performed_at FROM privacy_erasures ORDER BY performed_at) t) TO STDOUT" \
            > privacy-erasure-ledger.jsonl
          age -r "$AGE_RECIPIENT" -o privacy-erasure-ledger.jsonl.age \
            privacy-erasure-ledger.jsonl
          sha256sum privacy-erasure-ledger.jsonl.age \
            > privacy-erasure-ledger.jsonl.age.sha256
          rm -f privacy-erasure-ledger.jsonl

      - name: Upload to isolated R2 backup bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
        run: |
          set -euo pipefail
          prefix="backups/${BACKUP_BASE}"
          aws s3 cp "$BACKUP_FILE" "s3://${BUCKET}/${prefix}/${BACKUP_FILE}" --endpoint-url "$ENDPOINT"
          aws s3 cp "${BACKUP_FILE}.sha256" "s3://${BUCKET}/${prefix}/${BACKUP_FILE}.sha256" --endpoint-url "$ENDPOINT"
          aws s3 cp "$MANIFEST_FILE" "s3://${BUCKET}/${prefix}/${MANIFEST_FILE}" --endpoint-url "$ENDPOINT"
          aws s3 cp privacy-erasure-ledger.jsonl.age \
            "s3://${BUCKET}/privacy-ledger/latest.jsonl.age" --endpoint-url "$ENDPOINT"
          aws s3 cp privacy-erasure-ledger.jsonl.age.sha256 \
            "s3://${BUCKET}/privacy-ledger/latest.jsonl.age.sha256" --endpoint-url "$ENDPOINT"
          echo "Encrypted backup uploaded: ${prefix}" >> "$GITHUB_STEP_SUMMARY"

      - name: Prune snapshots older than 30 days
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
        run: |
          cutoff="$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          aws s3api list-objects-v2 --bucket "$BUCKET" --prefix backups/ \
            --endpoint-url "$ENDPOINT" \
            --query "Contents[?LastModified<='${cutoff}'].Key" --output text |
          tr '\t' '\n' | grep -v '^$' | while read -r key; do
            aws s3 rm "s3://${BUCKET}/${key}" --endpoint-url "$ENDPOINT"
          done || true

      - name: Telegram alert on failure
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          [ -n "$TOKEN" ] && [ -n "$CHAT" ] || exit 0
          curl -fsS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=UNIFAST encrypted DB backup failed. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            >/dev/null
