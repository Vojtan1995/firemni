name: DB Backup

on:
  # Plánované zálohy jsou VYPNUTÉ, dokud nejsou nastavené BACKUP_S3_* secrets
  # (jinak upload na R2/S3 padá a workflow svítí červeně). Po doplnění secrets
  # stačí cron níže odkomentovat.
  # schedule:
  #   - cron: '0 2 * * *'   # každý den 2:00 UTC (4:00 Prague letní čas)
  workflow_dispatch:
    # Umožní ruční spuštění z GitHub Actions UI

jobs:
  backup:
    name: pg_dump → R2/S3
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check backup storage configured
        id: cfg
        run: |
          if [ -z "${{ secrets.BACKUP_S3_BUCKET }}" ] || [ -z "${{ secrets.BACKUP_S3_ENDPOINT }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::BACKUP_S3_* secrets nejsou nastavené — upload zálohy přeskočen. Nastav je a odkomentuj cron v backup.yml."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install postgresql-client
        if: steps.cfg.outputs.configured == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        if: steps.cfg.outputs.configured == 'true'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          FILENAME="ucpavky_${TIMESTAMP}.sql.gz"
          echo "BACKUP_FILENAME=${FILENAME}" >> $GITHUB_ENV
          pg_dump "$DATABASE_URL" | gzip > "${FILENAME}"
          SIZE=$(du -sh "${FILENAME}" | cut -f1)
          echo "Backup hotov: ${FILENAME} (${SIZE})"

      - name: Upload to Cloudflare R2
        if: steps.cfg.outputs.configured == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          pip install --quiet awscli
          aws s3 cp "${BACKUP_FILENAME}" \
            "s3://${{ secrets.BACKUP_S3_BUCKET }}/backups/${BACKUP_FILENAME}" \
            --endpoint-url "${{ secrets.BACKUP_S3_ENDPOINT }}" \
            --no-progress
          echo "Upload hotov: s3://${{ secrets.BACKUP_S3_BUCKET }}/backups/${BACKUP_FILENAME}"

      - name: Prune backups older than 30 days
        if: steps.cfg.outputs.configured == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || \
                   date -u -v -30d +%Y-%m-%dT%H:%M:%SZ)
          echo "Mazání záloh starších než: ${CUTOFF}"
          aws s3api list-objects-v2 \
            --bucket "${{ secrets.BACKUP_S3_BUCKET }}" \
            --prefix "backups/" \
            --endpoint-url "${{ secrets.BACKUP_S3_ENDPOINT }}" \
            --query "Contents[?LastModified<='${CUTOFF}'].Key" \
            --output text | \
          tr '\t' '\n' | \
          grep -v '^$' | \
          while read key; do
            echo "Mazání: ${key}"
            aws s3 rm "s3://${{ secrets.BACKUP_S3_BUCKET }}/${key}" \
              --endpoint-url "${{ secrets.BACKUP_S3_ENDPOINT }}"
          done || true

      - name: Cleanup local dump
        if: always()
        run: rm -f "${BACKUP_FILENAME}"
