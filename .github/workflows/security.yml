name: Security Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '15 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  dependencies-and-secrets:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: security
          POSTGRES_PASSWORD: security-test-only
          POSTGRES_DB: security_gate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U security -d security_gate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://security:security-test-only@localhost:5432/security_gate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install exact backend dependencies
        working-directory: backend
        run: npm ci

      - name: Reject high/critical production vulnerabilities
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Validate schema and apply every migration to a clean database
        working-directory: backend
        run: |
          npx prisma validate
          npx prisma migrate deploy

      - name: Generate CycloneDX SBOM
        working-directory: backend
        run: npx --yes @cyclonedx/cyclonedx-npm@latest --omit dev --output-file ../backend-sbom.cdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.cdx.json

      - name: Scan repository secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Production manifest safety checks
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'android:allowBackup="false"' frontend/android/app/src/main/AndroidManifest.xml
          grep -q 'cleartextTrafficPermitted="false"' frontend/android/app/src/main/res/xml/network_security_config.xml
          ! grep -R -nE '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|JWT_SECRET=.{20,}|S3_SECRET_ACCESS_KEY=.{12,})' \
            --exclude='*.example' --exclude-dir=.git .

      - name: Scan packaged Android and Windows artifacts for embedded secrets
        shell: bash
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' artifact; do
            found=1
            echo "Scanning packaged artifact: $artifact"
            case "$artifact" in
              *.apk|*.msix)
                content_command=(unzip -p "$artifact")
                ;;
              *.exe)
                content_command=(strings "$artifact")
                ;;
            esac
            if "${content_command[@]}" 2>/dev/null \
              | strings \
              | grep -E -i '(MFA_DATA_KEY|JWT_SECRET|S3_SECRET_ACCESS_KEY|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY)'; then
              echo "::error::Potential secret embedded in $artifact"
              exit 1
            fi
          done < <(find releases frontend/build -type f \
            \( -iname '*.apk' -o -iname '*.msix' -o -iname '*.exe' \) \
            -print0 2>/dev/null || true)
          if [ "$found" -eq 0 ]; then
            echo "No packaged artifact present; source and manifest checks still completed."
          fi

  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci && npm run build
      - uses: github/codeql-action/analyze@v3
