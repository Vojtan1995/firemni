# DOC-01 – CI pipeline (backend Jest + Flutter analyze/unit/runtime)
# Viz docs/CI.md

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_DATABASE_URL: postgresql://ucpavky:ucpavky_dev@localhost:5432/ucpavky_test
  POSTGRES_ADMIN_URL: postgresql://ucpavky:ucpavky_dev@localhost:5432/ucpavky_test
  API_BASE_URL: http://localhost:3000

jobs:
  backend:
    name: Backend (Jest + PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ucpavky
          POSTGRES_PASSWORD: ucpavky_dev
          POSTGRES_DB: ucpavky_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ucpavky -d ucpavky_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: npm test

  flutter-unit:
    name: Flutter (analyze + unit/offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux SQLite dependency
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: flutter pub get
        working-directory: frontend
        run: flutter pub get

      - name: flutter analyze
        working-directory: frontend
        run: flutter analyze --no-fatal-infos

      - name: flutter test (unit/offline, no backend)
        working-directory: frontend
        run: >
          flutter test
          test/seal_list_offline_test.dart
          test/floor_list_offline_test.dart
          test/sync_conflict_test.dart
          test/seal_detail_offline_test.dart
          test/sync_retry_test.dart
          test/widget_test.dart

  flutter-runtime:
    name: Flutter (runtime API tests)
    runs-on: ubuntu-latest
    needs: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ucpavky
          POSTGRES_PASSWORD: ucpavky_dev
          POSTGRES_DB: ucpavky_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ucpavky -d ucpavky_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Prepare backend database and server
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          JWT_SECRET: ci-jwt-secret-not-for-production
          PORT: "3000"
          CORS_ORIGIN: http://localhost:3000
          PUBLIC_UPLOADS: "false"
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed
          npm run build
          mkdir -p uploads
          NODE_ENV=production npm start &
          for i in $(seq 1 30); do
            if curl -sf "${{ env.API_BASE_URL }}/health" > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux SQLite dependency
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: flutter pub get
        working-directory: frontend
        run: flutter pub get

      - name: flutter test (runtime + login E2E)
        working-directory: frontend
        run: >
          flutter test
          test/integration/runtime_verification_test.dart
          test/login_home_smoke_test.dart
          --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}
