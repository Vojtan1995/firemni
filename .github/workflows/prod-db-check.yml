name: Prod DB check

# Dočasný READ-ONLY diagnostický workflow. Ověří, proč Railway deploy padá na
# `prisma migrate deploy`: vypíše stav migrací a počet duplicitních prostupů
# (seal_entry_id) v produkční DB. Nic nezapisuje. Po vyřešení smazat.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Prod DB diagnostics (read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Guard – PROD_DATABASE_URL configured
        run: |
          if [ -z "${{ secrets.PROD_DATABASE_URL }}" ]; then
            echo "::error::PROD_DATABASE_URL secret není nastavený."
            exit 1
          fi

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Migrate status (read-only)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate status || true

      - name: Duplicate worksheet_items report (read-only)
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          node -e '
            const { PrismaClient } = require("@prisma/client");
            (async () => {
              const p = new PrismaClient();
              try {
                const dups = await p.$queryRawUnsafe(
                  "SELECT seal_entry_id, COUNT(*)::int AS n FROM worksheet_items GROUP BY seal_entry_id HAVING COUNT(*) > 1"
                );
                console.log("== Duplicitní prostupy ve worksheet_items ==");
                console.log("Skupin (seal_entry_id) s duplicitou:", dups.length);
                let extra = 0; for (const d of dups) extra += d.n - 1;
                console.log("Nadbytečných řádků k odstranění:", extra);
                for (const d of dups.slice(0, 50)) {
                  const rows = await p.workSheetItem.findMany({
                    where: { sealEntryId: d.seal_entry_id },
                    select: { sealNumber: true, worksheet: { select: { id: true, status: true } } },
                    orderBy: { createdAt: "asc" },
                  });
                  console.log(
                    "seal " + rows[0].sealNumber + ": " +
                    rows.map(r => r.worksheet.id.slice(0,8) + ":" + r.worksheet.status).join(", ")
                  );
                }
              } finally { await p.$disconnect(); }
            })().catch(e => { console.error(e); process.exit(1); });
          '
